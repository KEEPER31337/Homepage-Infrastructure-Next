name: KEEPER Homepage-Front-R2 deploy
on: workflow_dispatch 
# todo: 임시로 설정한 부분으로 나중에 release 태그 푸시나 어떻게 할지는 고민.

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps: 
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Build React App
        run: npm run build
        env:
          PUBLIC_API_URL: https://api.keeper.or.kr
          
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add remote host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Send static files to server
        run: rsync -az -e ssh ./build "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/lib/frontend_static_files"
